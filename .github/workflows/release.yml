# Build arm64 images and push to GHCR (RESEARCH.md Pattern 5, D-06/D-10/D-04).
# Closes the deploy loop: push to main -> CI build -> GHCR -> VPS pull (docker-compose.yml uses image:).
#
# D-04 matrix refactor: build/push landing + tours-web + tours-api images in parallel matrix jobs,
# then a single deploy job SSH's into VPS and `docker compose pull + up -d` recreates the three.
name: Build and Push to GHCR

on:
  push:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - 'apps/tours/**'
      - 'apps/lemon/**'
      - '.github/workflows/release.yml'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # GITHUB_TOKEN can push to GHCR — no separate PAT needed (T-01-08)
    strategy:
      fail-fast: false
      matrix:
        app: [landing, lemon, tours-web, tours-api]
        include:
          - app: landing
            context: "."
            file: ./apps/landing/Dockerfile
            image_suffix: landing
          - app: lemon
            context: "."
            file: ./apps/lemon/Dockerfile
            image_suffix: lemon
          - app: tours-web
            context: "."
            file: ./apps/tours/web/Dockerfile
            image_suffix: tours-web
          # tours-api context MUST be apps/tours/api — its Dockerfile is self-contained
          # (COPY pyproject.toml / COPY app/) and does NOT use root-relative paths
          # (using "." here would break the build — BLOCKER fix per Plan 02.1-02 D-04).
          - app: tours-api
            context: apps/tours/api
            file: ./apps/tours/api/Dockerfile
            image_suffix: tours-api
    steps:
      - uses: actions/checkout@v4

      # GitHub runners are x86_64 only — QEMU emulates arm64 for the arm64 VPS target (D-06).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # github.repository_owner is GHCR user (case-folded). lowercase via github mechanism.
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/luciel-platform-${{ matrix.image_suffix }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Auto-deploy: single SSH into VPS — git pull main, regenerate .env from GH repo
  # secrets, pull latest images, recreate the three services. Traefik is never
  # touched (D-01 — infra existed since Phase 1).
  #
  # GH repo secrets required (set via `gh secret set NAME -b "value"`):
  #   VPS_HOST, VPS_USER, VPS_SSH_KEY, DEPLOY_PATH          (Phase 01-02)
  #   NEXTAUTH_SECRET, ADMIN_INITIAL_PASSWORD, NEXTAUTH_URL, # tours app (02.1)
  #   JWT_ALGORITHM
  #   TRAEFIK_DASHBOARD_USER, TRAEFIK_DASHBOARD_PASS_HASH     # Phase 01 dashboard
  #   GHCR_OWNER                                             # GHCR owner (lowercase)
  #   GHCR_PAT (optional — only if GHCR package is private)
  #
  # To add a new env var: (1) add to .env.example, (2) `gh secret set NAME`,
  # (3) add to `env:` below + to the heredoc body in `script`.
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-vps
      cancel-in-progress: false  # never cancel a deploy mid-flight
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          ADMIN_INITIAL_PASSWORD: ${{ secrets.ADMIN_INITIAL_PASSWORD }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          JWT_ALGORITHM: ${{ secrets.JWT_ALGORITHM }}
          TRAEFIK_DASHBOARD_USER: ${{ secrets.TRAEFIK_DASHBOARD_USER }}
          TRAEFIK_DASHBOARD_PASS_HASH: ${{ secrets.TRAEFIK_DASHBOARD_PASS_HASH }}
          GHCR_OWNER: ${{ secrets.GHCR_OWNER }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: NEXTAUTH_SECRET,ADMIN_INITIAL_PASSWORD,NEXTAUTH_URL,JWT_ALGORITHM,TRAEFIK_DASHBOARD_USER,TRAEFIK_DASHBOARD_PASS_HASH,GHCR_PAT,GHCR_OWNER
          script: |
            set -eu
            cd ${{ secrets.DEPLOY_PATH }}

            # Sync compose + configs from main (fixes Phase-01-stale-VPS bug
            # discovered during Phase 02.1 deploy — VPS had Phase 01 compose
            # while local main had tours-web/tours-api; deploy silently failed).
            git fetch origin
            git reset --hard origin/main

            # Regenerate .env from GH repo secrets (idempotent — overwrites on
            # every CI deploy). Any manual edits on the VPS will be wiped. To
            # add a var, see the workflow header comment.
            cat > .env <<EOF_ENV
            # Managed by .github/workflows/release.yml deploy job.
            # Regenerated on every CI deploy — local manual edits will be wiped.
            # Generated: $(date -u +%FT%TZ)

            # GHCR image refs (GHCR_OWNER lowercase — GitHub case-folds)
            GHCR_OWNER=${GHCR_OWNER}
            GHCR_PAT=${GHCR_PAT}

            # Traefik dashboard basic-auth (D-17)
            TRAEFIK_DASHBOARD_USER=${TRAEFIK_DASHBOARD_USER}
            TRAEFIK_DASHBOARD_PASS_HASH=${TRAEFIK_DASHBOARD_PASS_HASH}

            # Tours (Phase 02.1) — JWT bridge NextAuth <-> FastAPI (D-02)
            NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
            NEXTAUTH_URL=${NEXTAUTH_URL}
            JWT_ALGORITHM=${JWT_ALGORITHM}
            ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD}
            EOF_ENV
            chmod 600 .env

            # GHCR login only when a PAT is provided (private packages).
            # Public packages pull anonymously.
            if [ -n "${GHCR_PAT}" ]; then
              printf '%s' "${GHCR_PAT}" | docker login ghcr.io -u "${GHCR_OWNER}" --password-stdin
            fi

            docker compose pull landing lemon tours-web tours-api
            docker compose up -d landing lemon tours-web tours-api
            docker image prune -f

            [ -n "${GHCR_PAT}" ] && docker logout ghcr.io 2>/dev/null || true