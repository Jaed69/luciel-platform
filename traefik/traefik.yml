# traefik/traefik.yml — STATIC config only (versioned, no secrets).
# ACME config goes via docker-compose CLI args — Traefik does NOT interpolate
# env vars in bind-mounted YAML files (per 01-RESEARCH.md Pattern 1 correction).

api:
  dashboard: true
  insecure: false  # Dashboard exposed via router + basicAuth, not insecure port

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: traefik-public

log:
  level: INFO

accessLog: {}

# ACME certificate resolver — defined here (not CLI args) because Traefik v3
# treats config-file and CLI-args as mutually exclusive. When traefik.yml is
# bind-mounted, Traefik loads it and ignores command: args entirely, which
# caused "nonexistent certificate resolver" errors.
# Staging→prod flip: comment the staging caServer line, uncomment the prod one.
certificatesResolvers:
  le:
    acme:
      email: twofigsthree@gmail.com
      storage: /acme.json
      # caServer: https://acme-staging-v02.api.letsencrypt.org/directory  # staging
      caServer: https://acme-v02.api.letsencrypt.org/directory  # production
      httpChallenge:
        entryPoint: web
